<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DrakenMc Network</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
  overflow-x: hidden;
  background: linear-gradient(180deg, #000814, #001d3d, #003566);
}

/* 🌊 Canvas fondo */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* 🌊 Olas */
.wave {
  position: fixed;
  bottom: 0;
  width: 200%;
  height: 120px;
  background: rgba(0,150,255,0.3);
  border-radius: 50%;
  animation: wave 8s infinite linear;
}

.wave2 {
  animation: wave 12s infinite linear reverse;
  opacity: 0.5;
}

@keyframes wave {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

.logo {
  font-size: 65px;
  font-weight: bold;
  margin-top: 40px;
  background: linear-gradient(90deg, #00cfff, #66ffff);
  -webkit-background-clip: text;
  color: transparent;
  text-shadow: 0 0 30px rgba(0,255,255,0.9);
}

.subtitle {
  color: #aeefff;
}

.section {
  padding: 60px 20px;
}

.card {
  background: rgba(0,0,30,0.8);
  margin: 20px;
  padding: 25px;
  border-radius: 20px;
  display: inline-block;
  width: 270px;
  transition: 0.4s;
}

/* 🔴 KitPvP */
.kitpvp {
  border: 2px solid #8b0000;
  box-shadow: 0 0 25px rgba(139,0,0,0.8);
}
.kitpvp:hover {
  transform: scale(1.08);
}

/* 🟢 Survival */
.survival {
  border: 2px solid #00ff7f;
  box-shadow: 0 0 25px rgba(0,255,127,0.8);
}
.survival:hover {
  transform: scale(1.08);
}

/* 🔵 Skyblock */
.skyblock {
  border: 2px solid #00bfff;
  box-shadow: 0 0 25px rgba(0,191,255,0.8);
}
.skyblock:hover {
  transform: scale(1.08);
}

.ip {
  background: linear-gradient(90deg, #00cfff, white);
  color: black;
  padding: 15px;
  border-radius: 10px;
  font-weight: bold;
}

button, .btn {
  margin-top: 15px;
  padding: 12px 25px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, #00cfff, #0066ff);
  color: white;
  cursor: pointer;
}

button:hover, .btn:hover {
  transform: scale(1.1);
}

#players {
  margin-top: 15px;
  color: #00cfff;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- 🌊 OLAS -->
<div class="wave"></div>
<div class="wave wave2"></div>

<div class="logo">🐉 DrakenMc Network</div>
<div class="subtitle">Servidor épico estilo océano 🌊🔥</div>

<div class="section">
<h2>🔥 Modalidades</h2>

<div class="card kitpvp">
<h3>🩸 KitPvP</h3>
<p>Peleas intensas</p>
</div>

<div class="card survival">
<h3>⚔️ Survival</h3>
<p>Aventura y economía</p>
</div>

<div class="card skyblock">
<h3>🏝️ Skyblock</h3>
<p>Islas en el cielo</p>
</div>

</div>

<div class="section">
<h2>🎮 Entrar</h2>

<div class="ip" id="ip">infernalmc.mcsh.io</div><br>
<button onclick="copyIP()">Copiar IP</button>

<div id="players">Cargando...</div>
</div>

<div class="section">
<a class="btn" href="https://discord.gg/JpEtzS4J" target="_blank">
🎮 Discord
</a>
</div>

<script>
// copiar IP
function copyIP(){
  const ip=document.getElementById("ip").innerText;
  navigator.clipboard.writeText(ip);
  alert("IP copiada");
}

// jugadores
fetch("https://api.mcsrvstat.us/2/infernalmc.mcsh.io")
.then(res=>res.json())
.then(data=>{
  document.getElementById("players").innerText =
    data.online ? "👥 "+data.players.online+" online" : "🔴 offline";
});

// 🌊 burbujas PRO
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let bubbles=[];
for(let i=0;i<100;i++){
  bubbles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*4
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(0,200,255,0.6)";
  
  bubbles.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fill();
    b.y-=0.7;
    if(b.y<0) b.y=canvas.height;
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
