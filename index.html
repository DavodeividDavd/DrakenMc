<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DrakenMc Network</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0a0a0a, #111);
      color: white;
      text-align: center;
    }

    header {
      padding: 60px;
      font-size: 50px;
      font-weight: bold;
      background: linear-gradient(90deg, red, cyan);
      animation: glow 3s infinite alternate;
    }

    @keyframes glow {
      from { filter: brightness(1); }
      to { filter: brightness(1.5); }
    }

    .section {
      padding: 50px;
    }

    .card {
      background: #1a1a1a;
      margin: 20px;
      padding: 25px;
      border-radius: 15px;
      display: inline-block;
      width: 260px;
      transition: 0.3s;
      box-shadow: 0 0 10px rgba(0,255,255,0.2);
    }

    .card:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px cyan;
    }

    .ip-box {
      margin-top: 20px;
    }

    .ip {
      background: cyan;
      color: black;
      padding: 12px;
      border-radius: 8px;
      display: inline-block;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: red;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: cyan;
      color: black;
    }

    footer {
      padding: 20px;
      background: #111;
      color: #aaa;
    }
  </style>
</head>

<body>

<header>
  🐉 DrakenMc Network
</header>

<div class="section">
  <h2>🔥 Modalidades</h2>

  <div class="card">
    <h3>⚔️ Survival</h3>
    <p>Economía, misiones y aventuras</p>
  </div>

  <div class="card">
    <h3>🩸 KitPvP</h3>
    <p>Peleas rápidas y épicas</p>
  </div>

  <div class="card">
    <h3>🏝️ Skyblock</h3>
    <p>Sobrevive en tu isla</p>
  </div>

</div>

<div class="section">
  <h2>🎮 Cómo entrar</h2>

  <div class="ip-box">
    <div class="ip" id="ip">infernalmc.mcsh.io</div><br>
    <button onclick="copyIP()">Copiar IP</button>
  </div>

  <p>Versión: 1.20+</p>
</div>

<footer>
  © 2026 DrakenMc Network
</footer>

<script>
function copyIP() {
  const ip = document.getElementById("ip").innerText;
  navigator.clipboard.writeText(ip);
  alert("IP copiada: " + ip);
}
</script>

</body>
</html>
