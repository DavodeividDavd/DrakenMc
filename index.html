<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DrakenMc Network</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b0f1a;
  color: white;
  text-align: center;
}

.header {
  padding: 70px 20px;
  background: linear-gradient(90deg, #001f3f, #003366);
}

.header h1 {
  font-size: 55px;
  margin: 0;
  color: #00cfff;
}

.header p {
  color: #aaa;
  margin-top: 10px;
}

.section {
  padding: 50px 20px;
}

.card {
  background: #111827;
  margin: 15px;
  padding: 25px;
  border-radius: 12px;
  display: inline-block;
  width: 260px;
  transition: 0.3s;
}

.kitpvp { border-bottom: 4px solid #ff0000; }
.survival { border-bottom: 4px solid #00ff7f; }
.skyblock { border-bottom: 4px solid #00bfff; }

.card:hover {
  transform: translateY(-6px);
}

.ip {
  background: #1f2937;
  padding: 12px;
  border-radius: 8px;
  display: inline-block;
  margin-top: 10px;
  font-weight: bold;
}

button, .btn {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  text-decoration: none;
}

button:hover, .btn:hover {
  background: #1d4ed8;
}

#players {
  margin-top: 10px;
  color: #60a5fa;
}
</style>
</head>

<body>

<div class="header">
  <h1>🐉 DrakenMc Network</h1>
  <p>Servidor de Minecraft 🔥</p>
</div>

<div class="section">
  <h2>Modalidades</h2>

  <div class="card kitpvp">
    <h3>🩸 KitPvP</h3>
    <p>Peleas intensas PvP</p>
  </div>

  <div class="card survival">
    <h3>⚔️ Survival</h3>
    <p>Economía y aventuras</p>
  </div>

  <div class="card skyblock">
    <h3>🏝️ Skyblock</h3>
    <p>Empieza desde cero en una isla</p>
  </div>
</div>

<div class="section">
  <h2>Entrar al servidor</h2>

  <div class="ip" id="ip">infernalmc.mcsh.io</div><br>
  <button onclick="copyIP()">Copiar IP</button>

  <div id="players">Cargando...</div>
</div>

<div class="section">
  <h2>Comunidad</h2>

  <a class="btn" href="https://discord.gg/JpEtzS4J" target="_blank">
    Discord
  </a>
</div>

<script>
function copyIP() {
  const ip = document.getElementById("ip").innerText;
  navigator.clipboard.writeText(ip);
  alert("IP copiada: " + ip);
}

fetch("https://api.mcsrvstat.us/2/infernalmc.mcsh.io")
.then(res => res.json())
.then(data => {
  document.getElementById("players").innerText =
    data.online ? "👥 " + data.players.online + " online" : "🔴 offline";
});
</script>

</body>
</html>
